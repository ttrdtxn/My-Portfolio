<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link rel="stylesheet" href="../style.css">
    <title>Seller's Product</title>

    <style>
        .dashboard {
            text-align: center;
            margin-top: 150px;
        }

        .wallet-btn {
            background-color: #4CAF50;
            border: none;
            color: white;
            padding: 10px;
            text-align: center;
            text-decoration: none;
            display: inline-block;
            font-size: 20px;
            /* margin: 4px 2px; */
            cursor: pointer;
            border-radius: 12px;
            transition: background-color 0.3s ease;
            font-weight: bold;
        }

        .wallet-btn:hover {
            background-color: #45a049;
        }

        /* Modal styles */
        .modal {
            display: none;
            position: fixed;
            z-index: 1;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            overflow: auto;
            background-color: rgb(0, 0, 0);
            background-color: rgba(0, 0, 0, 0.4);
            padding-top: 60px;
            border-radius: 10px;
        }

        .modal-headings {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .modal-content {
            background-color: #fefefe;
            margin: 5% auto;
            padding: 20px;
            border: 1px solid #888;
            width: 80%;
            border-radius: 20px;
        }

        .close {
            color: #aaa;
            float: right;
            font-size: 28px;
            font-weight: bold;
        }

        .close:hover,
        .close:focus {
            color: black;
            text-decoration: none;
            cursor: pointer;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 8px;
            box-sizing: border-box;
        }
    </style>
</head>

<body>

    <nav>
        <div class="navigation">
            <a href="index.html"><img src="../img/bloomAndThrive.svg" alt="Logo" width="120" height="70"
                    style="border-radius: 5px;"></a>
            <div class="menu">
                <a href="seller.html">Dashboard</a>
                <a href="HTML File Extensions/seller-products.html">Products</a>
                <a href="orders.html">Order Queries</a>
            </div>
        </div>
        <div class="btn-group">
            <button class="wallet-btn"><i class="fa-solid fa-wallet"></i></button>
            <button class="btn-2 logIn-btn">Account</button>
        </div>
    </nav>

    <div class="dashboard">
        <button class="wallet-btn" id="addProductBtn"><i class="fa fa-plus"></i> Add Product</button>
    </div>

    <!-- The Modal -->
    <div id="addProductModal" class="modal">
        <div class="modal-content">
            <div class="modal-headings">
                <h2>Add Product</h2>
                <span class="close">&times;</span>
            </div>
            <form id="addProductForm">
                <div class="form-group">
                    <label for="productName">Product Name</label>
                    <input type="text" id="productName" name="productName" required>
                </div>
                <div class="form-group">
                    <label for="productImage">Product Image</label>
                    <input type="file" id="productImage" name="productImage" required>
                </div>
                <div class="form-group">
                    <label for="productQuantity">Quantity/Stock</label>
                    <input type="number" id="productQuantity" name="productQuantity" required>
                </div>
                <div class="form-group">
                    <label for="productPrice">Price</label>
                    <input type="number" id="productPrice" name="productPrice" required>
                </div>
                <div class="form-group">
                    <label for="productDescription">Brief Description</label>
                    <textarea id="productDescription" name="productDescription" rows="4" required></textarea>
                </div>
                <button type="submit" class="wallet-btn">Add Product</button>
            </form>
        </div>
    </div>

    <div id="toastContainer"></div>

    <script src="js/admin-manageProduct.js"></script>
    <script src="../interactions.js" defer></script>

</body>

</html>
